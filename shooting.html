    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Photo HD">
    </div>

    <style>
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }

        .lightbox.show {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border: 8px solid white;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #fff;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .lightbox-close:hover {
            color: #ccc;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.querySelector('.lightbox-close');

            document.querySelectorAll('.photo-card img').forEach(img => {
                img.parentElement.addEventListener('click', () => {
                    // Reconstruct HD path
                    let hdSrcString = img.getAttribute('src');
                    // if it is a thumbnail from rates or shooting, replace the thumb folder with original
                    hdSrcString = hdSrcString.replace('_thumb', '');

                    lightboxImg.src = hdSrcString;
                    lightbox.classList.add('show');
                });
            });

            closeBtn.addEventListener('click', () => {
                lightbox.classList.remove('show');
                lightboxImg.src = '';
            });

            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    lightbox.classList.remove('show');
                    lightboxImg.src = '';
                }
            });
        });
    </script>
